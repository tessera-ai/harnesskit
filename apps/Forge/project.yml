name: Forge
options:
  bundleIdPrefix: com.harnesskit
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  Tessera:
    path: ../../packages/HarnessKit
targets:
  Forge:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Forge
    dependencies:
      - package: Tessera
    info:
      path: Forge/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Forge
        NSHealthShareUsageDescription: "Forge reads your recovery metrics (HRV, sleep, resting heart rate) to personalize workout plans."
        NSHealthUpdateUsageDescription: "Forge schedules workouts in your Apple Health to keep your fitness data in one place."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.harnesskit.Forge
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: Forge/Forge.entitlements
      properties:
        com.apple.developer.healthkit: true
