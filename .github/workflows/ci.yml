name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  # Swift format check
  swift-format:
    name: Swift format check
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install swift-format
        run: brew install swift-format

      - name: Check formatting
        run: |
          find packages apps \
            \( -path '*/.build' -o -path '*/DerivedData' \) -prune -o \
            -name '*.swift' -print0 \
            | xargs -0 swift-format lint --strict --parallel
          echo "All Swift files pass format check"

  # iOS app build (Forge)
  ios-app:
    name: Forge (Xcode build)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd apps/Forge
          xcodegen generate

      - name: Build for iOS Simulator
        run: |
          cd apps/Forge
          xcodebuild \
            -project Forge.xcodeproj \
            -scheme Forge \
            -destination 'generic/platform=iOS Simulator' \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  # Dashboard build + lint (Next.js)
  dashboard:
    name: Dashboard (build + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Lint
        working-directory: apps/dashboard
        run: npm run lint

      - name: Build
        working-directory: apps/dashboard
        run: npm run build
