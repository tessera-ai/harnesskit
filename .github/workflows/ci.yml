name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  # Swift format check
  swift-format:
    name: Swift format check
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install swift-format
        run: brew install swift-format

      - name: Check formatting
        run: |
          find packages apps \
            \( -path '*/.build' -o -path '*/DerivedData' \) -prune -o \
            -name '*.swift' -print0 \
            | xargs -0 swift-format lint --strict --parallel

  # iOS app build (Forge)
  ios-app:
    name: Forge (Xcode build)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Ensure iOS Simulator runtime
        run: |
          if ! xcrun simctl list runtimes | grep -q "iOS"; then
            echo "No iOS runtime found, downloading..."
            xcodebuild -downloadPlatform iOS
          fi

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd apps/Forge
          xcodegen generate

      - name: Build for iOS Simulator
        run: |
          cd apps/Forge
          # Pick the first available iOS simulator dynamically
          DEST_ID=$(xcrun simctl list devices available -j | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for runtime, devices in sorted(data.get('devices', {}).items()):
                if 'iOS' in runtime:
                    for d in devices:
                        if d.get('isAvailable'):
                            print(d['udid'])
                            sys.exit(0)
            sys.exit(1)
          ")
          echo "Using simulator: $DEST_ID"
          xcodebuild \
            -project Forge.xcodeproj \
            -scheme Forge \
            -destination "id=$DEST_ID" \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  # Dashboard build + lint (Next.js)
  dashboard:
    name: Dashboard (build + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Lint
        working-directory: apps/dashboard
        run: npm run lint

      - name: Build
        working-directory: apps/dashboard
        run: npm run build
